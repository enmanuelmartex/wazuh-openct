<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1010" viewBox="0 0 1600 1010" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<title>Wazuh + OpenCTI threat intelligence data flow</title>
<desc>Cyclic data flow: endpoint to Wazuh Manager to custom script to OpenCTI and back via enriched alert.</desc>

<defs>
  <style>
    
    :root {
      --bg-color: #0a0a0c;
      --vignette-color: #1c1e26;
      --dot-color: #ffffff;
      --text-main: #edecf0;
      --text-main-bright: #f3f2f6;
      --text-muted: #8a8a94;
      --text-dim: #55555e;
      --text-dim-2: #74747e;
      --text-bright: #ffffff;
      --box-bg: #0e0e12;
      --icon-stroke: #c8c8d0;
      --line-neutral: #bcbcc6;
      --moving-dot-neutral: #cfcfd6;
      --teal-main: #00a2ff;
      --purple-main: #a78bfa;
      --border-blend-color: #ffffff;
      --glass-base: #ffffff;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #f6f7f9;
        --vignette-color: #e2e4eb;
        --dot-color: #000000;
        --text-main: #1f1f24;
        --text-main-bright: #111115;
        --text-muted: #5f5f6b;
        --text-dim: #797986;
        --text-dim-2: #8c8c9a;
        --text-bright: #000000;
        --box-bg: #ffffff;
        --icon-stroke: #5f5f6b;
        --line-neutral: #8e8e9c;
        --moving-dot-neutral: #5f5f6b;
        --teal-main: #0066cc;
        --purple-main: #845ef7;
        --border-blend-color: #000000;
        --glass-base: #000000;
      }
    }
  </style>
  <radialGradient id="heroGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="var(--teal-main)" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="var(--teal-main)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="vign" cx="50%" cy="42%" r="62%">
    <stop offset="0%" stop-color="var(--vignette-color)" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="var(--bg-color)" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="var(--glass-base)" stop-opacity="0.075"/>
    <stop offset="100%" stop-color="var(--glass-base)" stop-opacity="0.015"/>
  </linearGradient>
  <linearGradient id="bN" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="var(--glass-base)" stop-opacity="0.24"/>
    <stop offset="100%" stop-color="var(--glass-base)" stop-opacity="0.05"/>
  </linearGradient>
  <linearGradient id="bT" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="var(--teal-main)" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="var(--border-blend-color)" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="var(--teal-main)" stop-opacity="0.15"/>
  </linearGradient>
  <linearGradient id="bP" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="var(--purple-main)" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="var(--border-blend-color)" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="var(--purple-main)" stop-opacity="0.15"/>
  </linearGradient>
  <pattern id="dots" width="46" height="46" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.3" fill="var(--dot-color)" fill-opacity="0.03"/>
  </pattern>
  <filter id="glow" x="-250%" y="-250%" width="600%" height="600%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="aN" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--line-neutral)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="aP" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--purple-main)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="aT" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--teal-main)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="1600" height="1010" rx="22" fill="var(--bg-color)"/>
<rect x="0" y="0" width="1600" height="1010" rx="22" fill="url(#vign)"/>
<rect x="0" y="0" width="1600" height="1010" rx="22" fill="url(#dots)"/>

<text  x="90" y="62" font-size="21" fill="var(--text-bright)" fill-opacity="0.2" letter-spacing="1">wazuh + opencti</text>
<text  x="295" y="62" font-size="21" font-weight="500" fill="var(--text-bright)" fill-opacity="0.45">threat intelligence data flow</text>
<line x1="90" y1="80" x2="770" y2="80" stroke="var(--text-bright)" stroke-opacity="0.08" stroke-width="1"/>

<ellipse cx="800" cy="300" rx="360" ry="300" fill="url(#heroGlow)"/>

<path id="c1" d="M440,360 C530,360 520,300 590,300" fill="none" stroke="var(--line-neutral)" stroke-opacity="0.5" stroke-width="2.2" stroke-linecap="round" marker-end="url(#aN)"/>
<path id="c2" d="M1010,300 C1095,300 1095,375 1180,375" fill="none" stroke="var(--line-neutral)" stroke-opacity="0.5" stroke-width="2.2" stroke-linecap="round" marker-end="url(#aN)"/>
<path id="c3" d="M1370,450 C1370,630 1210,770 1015,770" fill="none" stroke="var(--purple-main)" stroke-opacity="0.85" stroke-width="2.4" stroke-linecap="round" marker-end="url(#aP)"/>
<path id="c4" d="M620,680 C470,635 480,440 645,394" fill="none" stroke="var(--teal-main)" stroke-opacity="0.9" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="13 9" marker-end="url(#aT)"/>

<circle r="5" fill="var(--moving-dot-neutral)" filter="url(#glow)"><animateMotion dur="3.6s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#c1"/></animateMotion></circle>
<circle r="5" fill="var(--moving-dot-neutral)" filter="url(#glow)"><animateMotion dur="3.6s" repeatCount="indefinite" begin="-1.8s"><mpath xlink:href="#c1"/></animateMotion></circle>
<circle r="5" fill="var(--moving-dot-neutral)" filter="url(#glow)"><animateMotion dur="3.6s" repeatCount="indefinite" begin="-0.6s"><mpath xlink:href="#c2"/></animateMotion></circle>
<circle r="5" fill="var(--moving-dot-neutral)" filter="url(#glow)"><animateMotion dur="3.6s" repeatCount="indefinite" begin="-2.4s"><mpath xlink:href="#c2"/></animateMotion></circle>
<circle r="6" fill="var(--purple-main)" filter="url(#glow)"><animateMotion dur="4.4s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#c3"/></animateMotion></circle>
<circle r="6" fill="var(--purple-main)" filter="url(#glow)"><animateMotion dur="4.4s" repeatCount="indefinite" begin="-1.5s"><mpath xlink:href="#c3"/></animateMotion></circle>
<circle r="6" fill="var(--purple-main)" filter="url(#glow)"><animateMotion dur="4.4s" repeatCount="indefinite" begin="-3s"><mpath xlink:href="#c3"/></animateMotion></circle>
<circle r="6" fill="var(--teal-main)" filter="url(#glow)"><animateMotion dur="4.4s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#c4"/></animateMotion></circle>
<circle r="6" fill="var(--teal-main)" filter="url(#glow)"><animateMotion dur="4.4s" repeatCount="indefinite" begin="-1.5s"><mpath xlink:href="#c4"/></animateMotion></circle>
<circle r="6" fill="var(--teal-main)" filter="url(#glow)"><animateMotion dur="4.4s" repeatCount="indefinite" begin="-3s"><mpath xlink:href="#c4"/></animateMotion></circle>

<g  font-size="19" font-weight="500">
  <rect x="455" y="305" width="118" height="34" rx="17" fill="var(--box-bg)" stroke="var(--line-neutral)" stroke-opacity="0.32"/>
  <text x="514" y="328" text-anchor="middle" fill="var(--line-neutral)">events</text>
  <rect x="1018" y="300" width="178" height="34" rx="17" fill="var(--box-bg)" stroke="var(--line-neutral)" stroke-opacity="0.32"/>
  <text x="1107" y="323" text-anchor="middle" fill="var(--line-neutral)">matched groups</text>
  <rect x="1180" y="644" width="180" height="34" rx="17" fill="var(--box-bg)" stroke="var(--purple-main)" stroke-opacity="0.4"/>
  <text x="1270" y="667" text-anchor="middle" fill="var(--purple-main)">graphql · http</text>
  <rect x="318" y="520" width="318" height="34" rx="17" fill="var(--box-bg)" stroke="var(--teal-main)" stroke-opacity="0.4"/>
  <text x="477" y="543" text-anchor="middle" fill="var(--teal-main)">enriched alert · new event</text>
</g>

<g>
  <rect x="70" y="290" width="370" height="150" rx="24" fill="url(#glass)"/>
  <rect x="70.75" y="290.75" width="368.5" height="148.5" rx="23" fill="none" stroke="url(#bN)" stroke-width="1.5"/>
  <rect x="70" y="290" width="370" height="5" rx="2.5" fill="var(--text-bright)" fill-opacity="0.22"/>
  <rect x="94" y="318" width="64" height="64" rx="17" fill="var(--glass-base)" fill-opacity="0.05" stroke="var(--border-blend-color)" stroke-opacity="0.14"/>
  <g transform="translate(106,330)" fill="none" stroke="var(--icon-stroke)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
    <path d="M20,3 L34,9 L34,22 C34,31 27,36 20,38 C13,36 6,31 6,22 L6,9 Z"/>
    <path d="M14,20 L18,25 L27,15"/>
  </g>
  <text  x="178" y="350" font-size="32" font-weight="600" fill="var(--text-main)">Endpoint</text>
  <text  x="178" y="382" font-size="19" fill="var(--text-muted)">sysmon / fim · agent</text>
  <rect x="94" y="402" width="92" height="28" rx="14" fill="var(--glass-base)" fill-opacity="0.04" stroke="var(--border-blend-color)" stroke-opacity="0.14"/>
  <text  x="140" y="421" font-size="16" font-weight="500" text-anchor="middle" fill="var(--text-muted)">agent</text>
</g>

<g>
  <rect x="585" y="208" width="430" height="184" rx="26" fill="url(#glass)"/>
  <rect x="585" y="208" width="430" height="184" rx="26" fill="var(--teal-main)" fill-opacity="0.06"/>
  <rect x="585.75" y="208.75" width="428.5" height="182.5" rx="25" fill="none" stroke="url(#bT)" stroke-width="2"/>
  <rect x="585" y="208" width="430" height="5" rx="2.5" fill="var(--teal-main)" fill-opacity="0.85"/>
  <rect x="611" y="236" width="68" height="68" rx="18" fill="var(--glass-base)" fill-opacity="0.05" stroke="var(--teal-main)" stroke-opacity="0.5"/>
  <g transform="translate(625,250)" fill="none" stroke="var(--teal-main)" stroke-width="2.3" stroke-linejoin="round" stroke-linecap="round">
    <circle cx="20" cy="20" r="6.5"/>
    <circle cx="20" cy="5" r="3.6"/><circle cx="34" cy="29" r="3.6"/><circle cx="6" cy="29" r="3.6"/>
    <path d="M20,13 L20,8 M24,24 L31,28 M16,24 L9,28" stroke-opacity="0.6"/>
  </g>
  <text  x="699" y="276" font-size="36" font-weight="600" fill="var(--text-main-bright)">Wazuh Manager</text>
  <text  x="699" y="310" font-size="19" fill="var(--teal-main)" fill-opacity="0.9">rules + integration</text>
  <g  font-size="16" font-weight="500" text-anchor="middle">
    <rect x="611" y="344" width="78" height="28" rx="14" fill="var(--teal-main)" fill-opacity="0.06" stroke="var(--teal-main)" stroke-opacity="0.45"/>
    <text x="650" y="363" fill="var(--teal-main)">rules</text>
    <rect x="699" y="344" width="146" height="28" rx="14" fill="var(--teal-main)" fill-opacity="0.06" stroke="var(--teal-main)" stroke-opacity="0.45"/>
    <text x="772" y="363" fill="var(--teal-main)">integration</text>
    <rect x="855" y="344" width="84" height="28" rx="14" fill="var(--teal-main)" fill-opacity="0.06" stroke="var(--teal-main)" stroke-opacity="0.45"/>
    <text x="897" y="363" fill="var(--teal-main)">alerts</text>
  </g>
</g>

<g>
  <rect x="1180" y="300" width="380" height="150" rx="24" fill="url(#glass)"/>
  <rect x="1180" y="300" width="380" height="150" rx="24" fill="var(--purple-main)" fill-opacity="0.055"/>
  <rect x="1180.75" y="300.75" width="378.5" height="148.5" rx="23" fill="none" stroke="url(#bP)" stroke-width="1.6"/>
  <rect x="1180" y="300" width="380" height="5" rx="2.5" fill="var(--purple-main)" fill-opacity="0.85"/>
  <rect x="1204" y="328" width="64" height="64" rx="17" fill="var(--glass-base)" fill-opacity="0.05" stroke="var(--purple-main)" stroke-opacity="0.5"/>
  <g transform="translate(1216,340)" fill="none" stroke="var(--purple-main)" stroke-width="2.3" stroke-linejoin="round" stroke-linecap="round">
    <path d="M15,11 L7,20 L15,29"/><path d="M25,11 L33,20 L25,29"/><path d="M22,8 L18,32"/>
  </g>
  <text  x="1288" y="350" font-size="27" font-weight="600" fill="var(--text-main)">custom-opencti.py</text>
  <text  x="1288" y="382" font-size="18" fill="var(--purple-main)" fill-opacity="0.9">extract ioc → query</text>
  <rect x="1204" y="402" width="98" height="28" rx="14" fill="var(--purple-main)" fill-opacity="0.06" stroke="var(--purple-main)" stroke-opacity="0.45"/>
  <text  x="1253" y="421" font-size="16" font-weight="500" text-anchor="middle" fill="var(--purple-main)">python</text>
</g>

<g>
  <rect x="585" y="680" width="430" height="184" rx="26" fill="url(#glass)"/>
  <rect x="585" y="680" width="430" height="184" rx="26" fill="var(--teal-main)" fill-opacity="0.05"/>
  <rect x="585.75" y="680.75" width="428.5" height="182.5" rx="25" fill="none" stroke="url(#bT)" stroke-width="1.8"/>
  <rect x="585" y="680" width="430" height="5" rx="2.5" fill="var(--teal-main)" fill-opacity="0.7"/>
  <rect x="611" y="708" width="68" height="68" rx="18" fill="var(--glass-base)" fill-opacity="0.05" stroke="var(--teal-main)" stroke-opacity="0.5"/>
  <g transform="translate(625,722)" fill="none" stroke="var(--teal-main)" stroke-width="2.3" stroke-linejoin="round" stroke-linecap="round">
    <ellipse cx="20" cy="9" rx="13" ry="5"/>
    <path d="M7,9 L7,31 C7,35 13,36 20,36 C27,36 33,35 33,31 L33,9"/>
    <path d="M7,20 C7,24 13,25 20,25 C27,25 33,24 33,20" stroke-opacity="0.6"/>
  </g>
  <text  x="699" y="744" font-size="36" font-weight="600" fill="var(--text-main-bright)">OpenCTI</text>
  <text  x="699" y="778" font-size="19" fill="var(--teal-main)" fill-opacity="0.9">cti database · graphql</text>
  <text  x="699" y="806" font-size="17" fill="var(--text-dim)">observables + indicators</text>
  <g  font-size="16" font-weight="500" text-anchor="middle">
    <rect x="611" y="820" width="108" height="28" rx="14" fill="var(--teal-main)" fill-opacity="0.06" stroke="var(--teal-main)" stroke-opacity="0.45"/>
    <text x="665" y="839" fill="var(--teal-main)">graphql</text>
    <rect x="729" y="820" width="74" height="28" rx="14" fill="var(--teal-main)" fill-opacity="0.06" stroke="var(--teal-main)" stroke-opacity="0.45"/>
    <text x="766" y="839" fill="var(--teal-main)">http</text>
  </g>
</g>

<g  font-size="17" fill="var(--text-dim-2)">
  <line x1="90" y1="948" x2="124" y2="948" stroke="var(--teal-main)" stroke-width="3" stroke-dasharray="10 6"/>
  <text x="136" y="953">enrichment loop</text>
  <line x1="380" y1="948" x2="414" y2="948" stroke="var(--purple-main)" stroke-width="3"/>
  <text x="426" y="953">ioc query</text>
  <line x1="590" y1="948" x2="624" y2="948" stroke="var(--line-neutral)" stroke-width="3"/>
  <text x="636" y="953">raw events</text>
</g>

</svg>
