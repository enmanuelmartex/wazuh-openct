site_name: Wazuh + OpenCTI
site_description: >-
  Custom Wazuh integration that enriches alerts with OpenCTI threat intelligence,
  supporting modern OpenCTI (6.x / 7.x) and multiple Sysmon, FIM and Linux sources.

theme:
  name: material
  language: en
  palette:
    # Dark mode (default — matches the project's visual identity)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  favicon: assets/images/favicon-blue.png
  logo: assets/images/android-chrome-512x512.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Getting started:
      - Requirements: requirements.md
      - Compatibility: compatibility.md
      - How it works: how-it-works.md
  - What's new: whats-new.md
  - Installation:
      - Integration files: integration-files.md
      - Manager configuration: manager-configuration.md
      - Detection rules: detection-rules.md
  - Data sources:
      - Overview: overview.md
      - Syscheck (FIM): syscheck-fim.md
      - Sysmon (Windows): sysmon.md
      - Command-line IoCs: commandline-iocs.md
      - Linux sources: linux-sources.md
  - Event types: event-types.md
  - Step-by-step guide: step-by-step.md
  - Testing & troubleshooting: testing-troubleshooting.md
  - Reference:
      - Script internals: script-internals.md